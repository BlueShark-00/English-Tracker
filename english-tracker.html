<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리스닝AI — 영어 리스닝 트래커</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.puter.com/v2/"></script>
<style>
:root{--bg:#0a0f1e;--surface:#111827;--surface2:#1c2333;--border:#2a3348;--accent:#818cf8;--accent2:#34d399;--text:#e2e8f0;--text2:#64748b;--danger:#f87171;--good:#34d399;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* PIN */
#pinScreen{position:fixed;inset:0;background:var(--bg);z-index:999;display:none;align-items:center;justify-content:center;}
.pin-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;width:100%;max-width:320px;}
.pin-logo{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.pin-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:28px;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);transition:all .2s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);}
.pin-dot.error{background:var(--danger);border-color:var(--danger);}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-key{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:20px;padding:16px;border-radius:12px;cursor:pointer;transition:all .2s;}
.pin-key:hover{background:var(--border);border-color:var(--accent);}
.pin-key:active{transform:scale(.94);}
.pin-key.del{font-size:16px;color:var(--text2);}
.pin-err{color:var(--danger);font-size:13px;margin-top:14px;min-height:20px;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
nav{display:flex;gap:6px;flex-wrap:wrap;}
nav button{background:none;border:1px solid var(--border);color:var(--text2);padding:7px 13px;border-radius:20px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;transition:all .2s;}
nav button.active,nav button:hover{border-color:var(--accent);color:var(--accent);background:rgba(129,140,248,.1);}
.db-badge{font-size:11px;padding:4px 10px;border-radius:20px;font-family:'Space Mono',monospace;border:1px solid;}
.db-ok{background:rgba(52,211,153,.1);color:var(--good);border-color:rgba(52,211,153,.3);}
.db-err{background:rgba(248,113,113,.1);color:var(--danger);border-color:rgba(248,113,113,.3);}

/* LAYOUT */
main{max-width:800px;margin:0 auto;padding:24px 16px 80px;}
.section{display:none;}.section.active{display:block;}
.btn-p,.btn-g,.btn-d{border:none;cursor:pointer;border-radius:8px;font-family:'Noto Sans KR',sans-serif;transition:all .2s;font-size:13px;}
.btn-p{background:var(--accent);color:#fff;padding:10px 20px;}
.btn-p:hover{opacity:.85;}.btn-p:disabled{opacity:.4;cursor:not-allowed;}
.btn-g{background:var(--surface2);color:var(--text2);padding:8px 14px;border:1px solid var(--border);}
.btn-g:hover{color:var(--text);border-color:var(--accent);}
.btn-d{background:rgba(248,113,113,.15);color:var(--danger);padding:6px 12px;font-size:12px;}
.btn-d:hover{background:rgba(248,113,113,.3);}

/* SEC HEADER */
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;}

/* RECORDS */
.record-list{display:grid;gap:10px;}
.record-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;transition:border-color .2s;}
.record-card:hover{border-color:var(--accent);}
.record-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.record-date{font-family:'Space Mono',monospace;font-size:11px;color:var(--text2);}
.record-source{font-size:13px;color:var(--text);margin-top:3px;word-break:break-all;}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:26px;}
.score-bar-bg{height:6px;background:var(--border);border-radius:3px;margin-top:8px;}
.score-bar-fill{height:100%;border-radius:3px;transition:width .8s ease;}
.record-memo{font-size:12px;color:var(--text2);margin-top:8px;font-style:italic;}
.type-badge{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:20px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 13px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);}
.type-toggle{display:flex;gap:8px;}
.type-btn{flex:1;padding:9px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Noto Sans KR',sans-serif;}
.type-btn.active{border-color:var(--accent);background:rgba(129,140,248,.1);color:var(--accent);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.range-wrap{position:relative;}
.range-wrap input[type=range]{width:100%;accent-color:var(--accent);}
.range-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-top:3px;}
.ott-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:500px){.stats-row{grid-template-columns:1fr 1fr;}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:6px;}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:28px;}

/* CHART */
canvas{width:100%;border-radius:10px;}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;}

/* AI */
.ai-result{background:var(--surface2);border-radius:12px;padding:16px;border-left:3px solid var(--accent);margin-top:12px;}
.ai-label{font-size:11px;color:var(--accent);letter-spacing:1px;margin-bottom:8px;font-family:'Space Mono',monospace;}
.loading span{animation:blink 1.2s infinite;display:inline-block;margin:0 1px;}
.loading span:nth-child(2){animation-delay:.2s;}.loading span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* SCRIPT TAB */
.mode-toggle{display:flex;gap:6px;margin-bottom:16px;}
.mode-btn{flex:1;padding:9px 4px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Noto Sans KR',sans-serif;}
.mode-btn.active{border-color:var(--accent);background:rgba(129,140,248,.1);color:var(--accent);}
.topic-wrap{display:flex;flex-wrap:wrap;gap:6px;}
.topic-btn{padding:6px 12px;border-radius:99px;font-size:12px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .2s;font-family:'Noto Sans KR',sans-serif;}
.topic-btn.active{border-color:var(--accent);background:rgba(129,140,248,.1);color:var(--accent);font-weight:700;}
.script-box{background:var(--bg);border-radius:10px;padding:16px;font-size:14px;line-height:2;color:#c7d2fe;white-space:pre-wrap;font-family:'Noto Sans KR',sans-serif;}
.korean-toggle{width:100%;background:none;border:none;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;color:var(--accent2);font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;}
.vocab-item{padding:10px 0;border-top:1px solid var(--border);}
.vocab-item:first-child{border-top:none;}
.accent-btn{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .2s;font-family:'Noto Sans KR',sans-serif;}
.accent-btn.active{border-color:var(--accent);background:rgba(129,140,248,.1);color:var(--accent);font-weight:700;}

/* MISC */
.empty{text-align:center;padding:50px 20px;color:var(--text2);}
.empty .icon{font-size:44px;margin-bottom:10px;}
.empty p{font-size:13px;line-height:1.7;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--surface);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<!-- PIN -->
<div id="pinScreen">
  <div class="pin-box">
    <div class="pin-logo">리스닝AI</div>
    <div class="pin-sub">4자리 PIN을 입력하세요</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key" onclick="pinKey('0')" style="grid-column:2">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<!-- APP -->
<header>
  <div class="logo">리스닝AI</div>
  <nav>
    <button class="active" onclick="showTab('records',this)">📋 기록</button>
    <button onclick="showTab('analysis',this)">📊 분석</button>
    <button onclick="showTab('script',this)">🎧 AI 스크립트</button>
  </nav>
  <span class="db-badge db-ok" id="dbBadge">● DB 연결됨</span>
</header>

<main>
  <!-- 기록 탭 -->
  <div id="records" class="section active">
    <div class="sec-header">
      <div class="sec-title">📋 학습 기록</div>
      <button class="btn-p" onclick="openRecordModal()">+ 기록 추가</button>
    </div>
    <div class="record-list" id="recordList"></div>
  </div>

  <!-- 분석 탭 -->
  <div id="analysis" class="section">
    <div class="sec-header">
      <div class="sec-title">📊 학습 분석</div>
      <button class="btn-p" id="aiAnalysisBtn" onclick="runAIAnalysis()">🤖 오늘 분석</button>
    </div>
    <div class="stats-row" id="statsRow"></div>
    <div class="chart-wrap">
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px">📈 이해도 추이</div>
      <canvas id="trendCanvas" height="160"></canvas>
      <div id="trendEmpty" style="display:none;text-align:center;padding:30px;color:var(--text2);font-size:13px">기록이 2개 이상 있어야 그래프가 표시됩니다</div>
    </div>
    <!-- 분석 히스토리 목록 -->
    <div id="analysisHistoryList" style="margin-bottom:12px;"></div>
    <!-- 현재 분석 결과 -->
    <div id="aiAnalysisResult"></div>
  </div>

  <!-- AI 스크립트 탭 -->
  <div id="script" class="section">
    <div class="sec-title" style="margin-bottom:16px">🎧 AI 스크립트</div>

    <!-- 설정 -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;">
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:600">📌 주제</div>
      <div class="topic-wrap" id="topicWrap"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;">
        <div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600">⏱ 길이</div>
          <select id="durSelect" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;outline:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;">
            <option value="short">짧게 (30초)</option>
            <option value="medium">보통 (1분)</option>
            <option value="long">길게 (2분)</option>
          </select>
        </div>
        <div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600">🎓 난이도</div>
          <input id="levelInput" placeholder="비우면 AI 자동 설정" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;outline:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;">
        </div>
      </div>
    </div>

    <button class="btn-p" id="genScriptBtn15" onclick="generateScript('gemini-2.5-flash-lite')" style="width:100%;padding:13px;font-size:14px;margin-bottom:10px;">✨ AI 스크립트 생성</button>

    <!-- 캐시 안내 -->
    <div id="scriptCacheNote" style="display:none;font-size:11px;color:var(--text2);margin-bottom:10px;padding:6px 14px;background:var(--surface2);border-radius:8px;justify-content:space-between;align-items:center;">
      <span>📦 오늘 이미 생성된 스크립트 (API 절약됨)</span>
    </div>

    <!-- 저장된 스크립트 목록 -->
    <div id="savedScriptList" style="margin-bottom:14px;"></div>

    <!-- 스크립트 결과 -->
    <div id="scriptResult" style="display:none;">
      <div style="background:var(--surface);border:1px solid #312e81;border-radius:14px;padding:18px;margin-bottom:12px;">
        <div style="margin-bottom:14px;">
          <div id="scriptTitle" style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px;"></div>
          <div id="scriptMeta" style="font-size:12px;color:var(--accent);"></div>
        </div>

        <!-- TTS 컨트롤 -->
        <div style="text-align:center;">
          <!-- TTS 엔진 선택 -->
          <div style="display:flex;justify-content:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;">
            <button class="accent-btn active" id="ttsEngGoogle" onclick="setTTSEngine('google')">🔊 Google</button>
            <button class="accent-btn" id="ttsEngPuter" onclick="setTTSEngine('puter')">🆓 Puter</button>
          </div>

          <!-- API 키 안내 -->
          <div id="ttsKeyNote" style="display:none;font-size:11px;color:var(--text2);margin-bottom:8px;padding:5px 10px;background:var(--surface2);border-radius:8px;text-align:center;">
            Google TTS 키가 없어요. Supabase app_config에 google_tts_key 저장 필요
          </div>

          <!-- 발음 선택 -->
          <div style="display:flex;justify-content:center;gap:6px;margin-bottom:10px;">
            <button class="accent-btn active" id="accentUS" onclick="setAccent('us')">🇺🇸 미국</button>
            <button class="accent-btn" id="accentUK" onclick="setAccent('uk')">🇬🇧 영국</button>
            <button class="accent-btn" id="accentIN" onclick="setAccent('in')">🇮🇳 인도</button>
          </div>

          <!-- 속도 -->
          <div style="display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:4px;">
            <span style="font-size:11px;color:var(--text2);">🐢</span>
            <input type="range" id="speedRange" min="0.5" max="1.5" step="0.05" value="0.85"
              oninput="document.getElementById('speedLabel').textContent=parseFloat(this.value).toFixed(2)+'x'"
              style="width:130px;accent-color:var(--accent);">
            <span style="font-size:11px;color:var(--accent);font-family:'Space Mono',monospace;min-width:36px;" id="speedLabel">0.85x</span>
            <span style="font-size:11px;color:var(--text2);">🐇</span>
          </div>
          <div id="autoSpeedNote" style="font-size:11px;color:var(--text2);margin-bottom:12px;">난이도에 맞게 자동 설정됨</div>

          <button id="ttsBtn" onclick="toggleSpeak()" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;padding:12px 32px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px #6366f140;font-family:'Noto Sans KR',sans-serif;">▶ 듣기 시작</button>
        </div>

        <!-- 재생 게이지 -->
        <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:6px;">
            <span id="gaugeLabel">0 / 0 문장</span>
            <span id="gaugeSpeaker" style="color:var(--accent);font-weight:700;"></span>
          </div>
          <div id="gaugeTrack" onclick="seekGauge(event)" style="background:var(--border);border-radius:99px;height:8px;overflow:hidden;cursor:pointer;position:relative;">
            <div id="gaugeBar" style="height:100%;background:linear-gradient(90deg,#6366f1,#818cf8);border-radius:99px;width:0%;transition:width .2s;pointer-events:none;"></div>
          </div>
          <div style="font-size:10px;color:var(--text2);margin-top:4px;text-align:center;">게이지 터치로 원하는 위치로 이동</div>
        </div>
      </div>

      <!-- 영어 스크립트 토글 (한국어 번역 위) -->
      <div style="background:var(--surface);border:1px solid #312e81;border-radius:14px;overflow:hidden;margin-bottom:12px;">
        <button onclick="toggleEngScript()" style="width:100%;background:none;border:none;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
          <span style="font-size:13px;color:var(--accent);font-weight:600;">📄 영어 스크립트</span>
          <span id="engScriptArrow" style="transition:transform .3s;font-size:18px;color:var(--accent);">⌄</span>
        </button>
        <div id="engScriptBox" style="display:none;padding:0 18px 16px;">
          <div style="border-top:1px solid #312e81;padding-top:14px;">
            <div class="script-box" id="scriptTextToggle" style="font-size:13px;"></div>
          </div>
        </div>
      </div>

      <!-- 한국어 번역 토글 -->
      <div style="background:#0c1a1a;border:1px solid #134e4a;border-radius:14px;overflow:hidden;margin-bottom:12px;">
        <button class="korean-toggle" onclick="toggleKorean()">
          <span>🇰🇷 한국어 번역</span>
          <span id="koreanArrow" style="transition:transform .3s;font-size:18px;">⌄</span>
        </button>
        <div id="koreanBox" style="display:none;padding:0 18px 16px;">
          <div style="border-top:1px solid #134e4a;padding-top:14px;font-size:13px;color:#99f6e4;line-height:1.8;" id="koreanText"></div>
        </div>
      </div>

      <!-- 핵심 표현 -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;">
        <div style="font-size:13px;color:#fbbf24;font-weight:700;margin-bottom:12px;">📖 핵심 표현</div>
        <div id="vocabList"></div>
      </div>

      <!-- 학습 팁 -->
      <div style="background:#1c1917;border:1px solid #44403c;border-radius:14px;padding:16px;">
        <div style="font-size:12px;color:#fbbf24;font-weight:700;margin-bottom:6px;">💡 학습 팁</div>

function renderTrend() {
  // 날짜별 평균으로 그룹핑
  const byDate = {};
  records.forEach(r => {
    if (!byDate[r.log_date]) byDate[r.log_date] = [];
    byDate[r.log_date].push(r.score);
  });
  const sorted = Object.entries(byDate)
    .sort((a, b) => a[0].localeCompare(b[0]))
    .slice(-14)
    .map(([date, scores]) => ({ date, avg: Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) }));

  const canvas = document.getElementById('trendCanvas');
  const empty = document.getElementById('trendEmpty');
  if (sorted.length < 2) { canvas.style.display = 'none'; empty.style.display = 'block'; return; }
  canvas.style.display = 'block'; empty.style.display = 'none';
  canvas.width = canvas.offsetWidth * window.devicePixelRatio || 700;
  canvas.height = 160 * (window.devicePixelRatio || 1);
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
  const RW = W / (window.devicePixelRatio || 1), RH = H / (window.devicePixelRatio || 1);
  ctx.clearRect(0, 0, RW, RH);
  const pad = { l: 36, r: 12, t: 12, b: 32 };
  const scores = sorted.map(r => r.avg);
  const minS = Math.max(0, Math.min(...scores) - 10), maxS = Math.min(100, Math.max(...scores) + 10);
  const xStep = (RW - pad.l - pad.r) / (sorted.length - 1);
  const yScale = (RH - pad.t - pad.b) / (maxS - minS);
  ctx.strokeStyle = '#2a3348'; ctx.lineWidth = 1;
  [0, 25, 50, 75, 100].filter(s => s >= minS && s <= maxS).forEach(s => {
    const y = RH - pad.b - (s - minS) * yScale;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(RW - pad.r, y); ctx.stroke();
    ctx.fillStyle = '#475569'; ctx.font = '9px Space Mono'; ctx.fillText(s, 2, y + 4);
  });
  const gr = ctx.createLinearGradient(0, pad.t, 0, RH - pad.b);
  gr.addColorStop(0, 'rgba(129,140,248,.35)'); gr.addColorStop(1, 'rgba(129,140,248,0)');
  ctx.beginPath();
  sorted.forEach((r, i) => { const x = pad.l + i * xStep, y = RH - pad.b - (r.avg - minS) * yScale; i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); });
  ctx.lineTo(pad.l + (sorted.length - 1) * xStep, RH - pad.b); ctx.lineTo(pad.l, RH - pad.b);
  ctx.closePath(); ctx.fillStyle = gr; ctx.fill();
  ctx.beginPath(); ctx.strokeStyle = '#818cf8'; ctx.lineWidth = 2.5;
  sorted.forEach((r, i) => { const x = pad.l + i * xStep, y = RH - pad.b - (r.avg - minS) * yScale; i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); });
  ctx.stroke();
  sorted.forEach((r, i) => {
    const x = pad.l + i * xStep, y = RH - pad.b - (r.avg - minS) * yScale;
    const col = r.avg < 30 ? '#f87171' : r.avg < 55 ? '#f59e0b' : r.avg < 75 ? '#818cf8' : '#34d399';
    ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fillStyle = col; ctx.fill();
    ctx.strokeStyle = '#0a0f1e'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#64748b'; ctx.font = '9px Space Mono'; ctx.fillText(r.date.slice(5), x - 12, RH - pad.b + 14);
  });
}

  analysisHistory = analysisHistory.filter(h => h.cache_date !== today);

  document.getElementById('aiAnalysisResult').innerHTML = '';
  await doAnalysis(today);
}

  try {

    const result = JSON.parse(txt);

    // YouTube 추천 항목에 실제 검색 수행
    if (result.recommendations) {
      const ytRecs = result.recommendations.filter(r => r.type === 'youtube');
      // 난이도 순서 파악 (고급 > 중급 > 초급)
      const diffOrder = { '고급': 3, '중급': 2, '초급': 1 };
      const harderIdx = ytRecs.length === 2
        ? (diffOrder[ytRecs[0].difficulty] >= diffOrder[ytRecs[1].difficulty] ? 0 : 1)
        : 0;

      let ytCount = 0;
      const levelKey = getLevelKey(avg);
      for (let rec of result.recommendations) {
        if (rec.type === 'youtube' && rec.searchQuery) {

          let found;
          if (isHarder) {

          if (found && !found.error) {
            rec.url = found.url;
            rec.title = found.title;
            rec.channel = found.channel;
            rec.videoId = found.videoId;
            rec.hasCaption = found.hasCaption || isHarder;
            rec.transcriptSnippet = found.transcriptSnippet;
          } else {
            rec._ytError = found?.error || 'YouTube 검색 실패';
          }
          ytCount++;
        }
        // external URL 도메인 검증 - 허용되지 않은 사이트면 URL 제거
        if (rec.type === 'external' && rec.url) {
          const isAllowed = ALLOWED_EXTERNAL_DOMAINS.some(domain => rec.url.includes(domain));

            console.warn('허용되지 않은 외부 URL 제거:', rec.url);
            rec._urlBlocked = true;
            rec.url = '';
          }
        }
      }
    }
    // 오늘 기존 캐시 삭제 후 새로 저장
    await sb.from('eng_analysis_cache').delete().eq('cache_date', today);
    const { data: saved } = await sb.from('eng_analysis_cache').insert(
      { cache_date: today, record_count: records.length, result }
    ).select().single();
    // 히스토리 업데이트
    if (saved) {
      analysisHistory = [saved, ...analysisHistory.filter(h => h.cache_date !== today)];
      renderAnalysisHistory();
    }
    renderAIAnalysis(result, avg, today);
  } catch (e) {
    document.getElementById('aiAnalysisResult').innerHTML = `<p style="color:var(--danger);text-align:center">분석 오류: ${e.message}</p>`;

}

// YouTube Data API로 실제 클립 검색
async function searchYouTubeClip(query, level, requireCaption = false) {
  if (!youtubeApiKey) return { error: 'YouTube API 키가 없어요. Supabase app_config에 youtube_api_key 확인' };
  const levelQuery = level.includes('초') ? 'beginner' : level.includes('중') ? 'intermediate' : 'advanced';
  const q = encodeURIComponent(`${query} english listening ${levelQuery}`);
  try {
    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&videoDuration=short&maxResults=10&relevanceLanguage=en&key=${youtubeApiKey}`
    );
    const data = await res.json();
    if (data.error) return { error: `YouTube API 오류: ${data.error.message}` };
    const items = (data.items || []).filter(it => {
      const title = it.snippet.title;
      const channel = it.snippet.channelTitle;
      return !title.match(/[가-힣ㄱ-ㅎㅏ-ㅣ\u0600-\u06FF\u0750-\u077F]/)
          && !channel.match(/[가-힣ㄱ-ㅎㅏ-ㅣ\u0600-\u06FF]/);
    });
    if (!items.length) return { error: '검색 결과 없음' };
    const item = items[0];
    return {
      title: item.snippet.title,
      url: `https://www.youtube.com/watch?v=${item.id.videoId}`,
      channel: item.snippet.channelTitle,
      videoId: item.id.videoId,
      hasCaption: false
    };
  } catch(e) { return { error: `YouTube 검색 오류: ${e.message}` }; }
}

function getLevelKey(avg) {
  if (avg === null) return 'B1';
  if (avg < 20) return 'A1';
  if (avg < 35) return 'A2';
  if (avg < 50) return 'B1';
  if (avg < 65) return 'B2';
  return 'C1';
}

async function searchYouTubeWithCaption(query, levelKey) {
  if (!youtubeApiKey) return { error: 'YouTube API 키 없음' };
  const channels = CAPTION_CHANNELS[levelKey] || CAPTION_CHANNELS.B1;
  // 채널 중 랜덤 선택 (매번 다른 채널)
  const channel = channels[Math.floor(Math.random() * channels.length)];
  const q = encodeURIComponent(query);
  try {
    const res = await fetch(
      `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&channelId=${channel.id}&videoDuration=short&maxResults=5&key=${youtubeApiKey}`
    );
    const data = await res.json();
    if (data.error) return { error: `YouTube API 오류: ${data.error.message}` };
    const item = data.items?.[0];
    if (!item) {
      // 해당 채널에 결과 없으면 일반 검색으로 fallback
      return searchYouTubeClip(query + ' english learning subtitles', levelKey, true);
    }
    const videoId = item.id.videoId;

    // 자막 가져와서 난이도 분석
    let transcriptSnippet = '';
    try {
      const tRes = await fetch(`https://api.superplugin.ai/yt?v=${videoId}&lang=en`);
      if (tRes.ok) {
        const tData = await tRes.json();
        transcriptSnippet = (tData.transcript || tData.text || '').slice(0, 500);
      }
    } catch(e) {}

    return {
      title: item.snippet.title,
      url: `https://www.youtube.com/watch?v=${videoId}`,
      channel: channel.name,
      videoId,
      hasCaption: true,
      transcriptSnippet
    };
  } catch(e) { return { error: `YouTube 검색 오류: ${e.message}` }; }
}

function autoSetSpeed(levelText) {
  const l = (levelText || '').toLowerCase();
  let speed = 0.85;
  if (l.includes('a1') || l.includes('완전초보')) speed = 0.65;
  else if (l.includes('a2') || l.includes('초급')) speed = 0.75;
  else if (l.includes('b1') || l.includes('초중급')) speed = 0.85;
  else if (l.includes('b2') || l.includes('중급')) speed = 1.0;
  else if (l.includes('c1') || l.includes('중고급')) speed = 1.1;
  else if (l.includes('c2') || l.includes('고급')) speed = 1.2;
  const r = document.getElementById('speedRange');
  const r2 = document.getElementById('speedRange2');
  const lbl = document.getElementById('speedLabel');
  if (r) r.value = speed;
  if (r2) r2.value = speed;
  if (lbl) lbl.textContent = speed.toFixed(2) + 'x';
  document.getElementById('autoSpeedNote').textContent = `난이도 ${levelText || ''}에 맞게 자동 설정 (${speed}x)`;
}

// A/B 대화 파싱
function parseScript(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const result = [];
  for (const line of lines) {
    const m = line.match(/^([A-Z]):\s*(.*)/);
    if (m && m[2].trim()) result.push({ speaker: m[1], text: m[2].trim() });
    else if (line.trim() && !line.match(/^[A-Z]:$/)) result.push({ speaker: 'N', text: line.trim() });
  }
  const hasDialog = result.some(r => r.speaker === 'A' || r.speaker === 'B');
  return hasDialog ? result : [{ speaker: 'N', text: text.trim() }];
}

function updateGauge(idx, total, speaker) {
  const bar = document.getElementById('gaugeBar');
  const label = document.getElementById('gaugeLabel');
  const spk = document.getElementById('gaugeSpeaker');
  if (bar) bar.style.width = total ? `${Math.round((idx / total) * 100)}%` : '0%';
  if (label) label.textContent = total ? `${idx} / ${total} 문장` : '0 / 0 문장';
  if (spk) spk.textContent = speaker === 'A' ? '🗣 A' : speaker === 'B' ? '🗣 B' : '';
}

async function toggleSpeak() {
  if (isSpeaking) {
    stopRequested = true;
    runId++;
    if (curAudio) { try { curAudio.pause(); } catch(e){} curAudio = null; }
    isSpeaking = false;
    updateTTSButtons();
    return;
  }
  if (!curScript) return;

  const segments = parseScript(curScript.script);
  if (JSON.stringify(segments) !== JSON.stringify(curSegments)) {
    curSegments = segments;
    curSegIdx = 0;
  }
  if (curSegIdx >= curSegments.length) curSegIdx = 0;

  stopRequested = false;
  runId++;
  const myRunId = runId;
  isSpeaking = true;
  updateTTSButtons();
  updateGauge(curSegIdx, curSegments.length, curSegments[curSegIdx]?.speaker);

  const speed = parseFloat(document.getElementById('speedRange')?.value || 0.85);

  try {
    if (ttsEngine === 'google') await runSegmentsGoogle(speed, myRunId);
    else if (ttsEngine === 'puter') await runSegmentsPuter(speed, myRunId);
  } catch(e) {
    console.error('TTS 오류:', e);
  }

  if (runId === myRunId) {
    isSpeaking = false;
    updateTTSButtons();
    if (curSegIdx >= curSegments.length) {
      curSegIdx = 0;
      updateGauge(0, curSegments.length, '');
    }
  }
}

async function playAudio(audio, speed, myRunId) {
  return new Promise((resolve) => {
    curAudio = audio;
    let done = false;
    const finish = () => { if (!done) { done = true; curAudio = null; resolve(); } };
    if (audio.playbackRate !== undefined) audio.playbackRate = speed;
    audio.onended = finish;
    audio.onerror = () => { finish(); };
    // 안전 타임아웃
    setTimeout(finish, 30000);
    audio.play().catch(finish);
    // runId 바뀌면 즉시 종료
    const check = setInterval(() => {
      if (runId !== myRunId) { clearInterval(check); try { audio.pause(); } catch(e){} finish(); }
    }, 100);
    audio.onended = () => { clearInterval(check); finish(); };
  });
}

async function runSegmentsPuter(speed, myRunId) {
  const voices = PUTER_VOICES[selAccent] || PUTER_VOICES.us;
  while (curSegIdx < curSegments.length && !stopRequested && runId === myRunId) {
    const seg = curSegments[curSegIdx];
    const voice = seg.speaker === 'B' ? voices.B : voices.A;
    updateGauge(curSegIdx + 1, curSegments.length, seg.speaker);
    try {
      const audio = await puter.ai.txt2speech(seg.text, { voice, engine: 'neural' });
      if (runId !== myRunId) break;
      await playAudio(audio, speed, myRunId);
      if (runId === myRunId && !stopRequested) await new Promise(r => setTimeout(r, 100));
    } catch(e) { console.warn('Puter 건너뜀:', e.message); }
    if (runId === myRunId && !stopRequested) curSegIdx++;
  }
}

// OpenAI 목소리

// ── Google Cloud TTS ──
// A/B 목소리: 억양별 여성(A)/남성(B) Neural 음성
const GOOGLE_VOICES = {
  us: { A: 'en-US-Neural2-F', B: 'en-US-Neural2-D' },
  uk: { A: 'en-GB-Neural2-A', B: 'en-GB-Neural2-B' },
  in: { A: 'en-IN-Neural2-A', B: 'en-IN-Neural2-B' },
};

async function googleTTS(text, voiceName, speed) {
  if (!ttsKeys.google) throw new Error('Google TTS 키 없음');
  const langCode = voiceName.slice(0, 5); // en-US, en-GB, en-IN
  const res = await fetch(
    `https://texttospeech.googleapis.com/v1/text:synthesize?key=${ttsKeys.google}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        input: { text },
        voice: { languageCode: langCode, name: voiceName },
        audioConfig: { audioEncoding: 'MP3', speakingRate: speed }
      })
    }
  );
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || res.status);
  }
  const data = await res.json();
  // base64 MP3 → Blob → URL
  const binary = atob(data.audioContent);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return URL.createObjectURL(new Blob([bytes], { type: 'audio/mp3' }));
}

async function runSegmentsGoogle(speed, myRunId) {
  if (!ttsKeys.google) {
    document.getElementById('ttsKeyNote').style.display = 'block';
    alert('Google TTS 키가 없어요.\nSupabase app_config에 google_tts_key를 추가하세요.');
    return;
  }
  const voices = GOOGLE_VOICES[selAccent] || GOOGLE_VOICES.us;
  while (curSegIdx < curSegments.length && runId === myRunId) {
    const seg = curSegments[curSegIdx];
    const voiceName = seg.speaker === 'B' ? voices.B : voices.A;
    updateGauge(curSegIdx + 1, curSegments.length, seg.speaker);
    try {
      const url = await googleTTS(seg.text, voiceName, speed);
      if (runId !== myRunId) { URL.revokeObjectURL(url); break; }
      const audio = new Audio(url);
      await playAudio(audio, 1, myRunId);
      URL.revokeObjectURL(url);
      if (runId === myRunId) await new Promise(r => setTimeout(r, 80));
    } catch(e) { console.warn('Google TTS 건너뜀:', e.message); }
    if (runId === myRunId) curSegIdx++;
  }
}

// ──────────────────────────────────────────
//  GEMINI 공통 재시도 헬퍼
// ──────────────────────────────────────────
function parseRetryWait(msg) {
  const m = msg.match(/retry in ([\d.]+)s/i);
  return m ? Math.ceil(parseFloat(m[1])) + 3 : null;
}

async function geminiRetryWait(retryCount, msg, btnId) {
  const wait = parseRetryWait(msg) || [15, 30, 60, 60, 60][Math.min(retryCount, 4)];
  console.log(`Gemini 재시도 ${retryCount+1}회 (${wait}초 후)...`);
  const btn = document.getElementById(btnId || 'genScriptBtn') || document.getElementById('aiAnalysisBtn');
  const orig = btn ? btn.innerHTML : '';
  for (let i = wait; i > 0; i--) {
    if (btn) btn.innerHTML = `<span>⏳ ${i}초 후 재시도...</span>`;
    await new Promise(r => setTimeout(r, 1000));
  }
  if (btn && orig) btn.innerHTML = orig;
}

async function callGeminiWithSearch(prompt, retryCount = 0) {
  if (!GEMINI_KEY) throw new Error('Gemini 키를 불러오지 못했습니다.');
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      tools: [{ google_search: {} }],
      generationConfig: { temperature: 0.3 }
    })
  });
  const d = await res.json();
  if (d.error) {
    const code = d.error.code;
    const msg = d.error.message || '';
    const isRetryable = code === 429 || code === 503
      || msg.toLowerCase().includes('high demand')
      || msg.toLowerCase().includes('overloaded')
      || msg.toLowerCase().includes('temporarily')
      || msg.toLowerCase().includes('quota')
      || msg.toLowerCase().includes('retry');
    if (isRetryable && retryCount < 5) {
      await geminiRetryWait(retryCount, msg, 'aiAnalysisBtn');
      return callGeminiWithSearch(prompt, retryCount + 1);
    }
    throw new Error(d.error.message);
  }
  const txt = d.candidates?.[0]?.content?.parts?.find(p => p.text)?.text || '';
  return txt.replace(/```json|```/g, '').trim();
}

async function callGemini(prompt, retryCount = 0, model = 'gemini-2.5-flash') {
  if (!GEMINI_KEY) throw new Error('Gemini 키를 불러오지 못했습니다. DB 연결을 확인하세요.');
  // 1.5-flash-latest → 정식 모델명
  const modelId = model === 'gemini-2.5-flash-lite' ? 'gemini-2.5-flash-lite' : model;
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${GEMINI_KEY}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.4 } })
  });
  const d = await res.json();
  if (d.error) {
    const code = d.error.code;
    const msg = d.error.message || '';
    const isRetryable = code === 429 || code === 503
      || msg.toLowerCase().includes('high demand')
      || msg.toLowerCase().includes('overloaded')
      || msg.toLowerCase().includes('temporarily')
      || msg.toLowerCase().includes('quota')
      || msg.toLowerCase().includes('retry');
    if (isRetryable && retryCount < 5) {
      await geminiRetryWait(retryCount, msg, 'genScriptBtn');
      return callGemini(prompt, retryCount + 1, model);
    }
    throw new Error(d.error.message);
  }
  const txt = d.candidates?.[0]?.content?.parts?.[0]?.text || '';
  return txt.replace(/```json|```/g, '').trim();
}
